<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin - Cluster</title>
    <link rel="stylesheet" href="/assets/style.css" />
  </head>
  <body>
    <div class="layout">
      <aside class="sidebar">
        <h2>Cluster</h2>
        <nav><a class="active" href="#">Servers</a></nav>
        <button id="logoutBtn" class="danger">Logout</button>
      </aside>
      <main class="content">
        <header class="topbar">
          <h1>Servers</h1>
          <div class="actions-row">
            <button id="refreshBtn">Atualizar</button>
            <button id="cleanupNodesBtn" type="button">Limpar nós inválidos</button>
          </div>
        </header>

        <section id="summary" class="summary-grid"></section>
        <p id="statusMsg"></p>

        <section class="card register-card">
          <h3>Cadastrar novo servidor</h3>
          <label>
            URL Tailscale do servidor
            <input id="newServerUrl" type="url" placeholder="http://100.x.x.x:3000" />
          </label>
          <div class="actions-row">
            <button id="testConnectionBtn" type="button">Testar conexão</button>
            <button id="registerServerBtn" type="button">Cadastrar servidor</button>
          </div>
          <p id="registerMsg"></p>
        </section>

        <section>
          <table>
            <thead>
              <tr>
                <th>Servidor</th>
                <th>URL Tailscale</th>
                <th>Status</th>
                <th>Role</th>
                <th>URL pública</th>
                <th>Último seen</th>
                <th>Hospedando frontend público</th>
                <th>Ações</th>
              </tr>
            </thead>
            <tbody id="serversBody"></tbody>
          </table>
        </section>
      </main>
    </div>

    <script src="/assets/admin.js"></script>
  </body>
</html>
